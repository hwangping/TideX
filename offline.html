<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TideX Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f2f9ff;
        color: #10324a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(92vw, 460px);
        border: 1px solid rgba(10, 90, 140, 0.15);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.85);
        padding: 20px;
        text-align: center;
        box-shadow: 0 14px 30px rgba(13, 58, 92, 0.12);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.3rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #45637a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TideX</h1>
      <p>You are offline. Reconnect to fetch map tiles and live tide data.</p>
    </main>
  </body>
</html>
